name: Docker Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-arch:
    name: Build & Push (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          arch="${{ matrix.arch }}"
          ref_name="${GITHUB_REF_NAME}"
          safe_ref="${ref_name//\//-}"

          if [[ ! "$safe_ref" =~ ^v([0-9]+(\.[0-9]+){0,2}([.-].+)?)$ ]]; then
            echo "Tag must match v<semver>, got: $safe_ref" >&2
            exit 1
          fi
          plain_ref="${BASH_REMATCH[1]}"

          tags=(
            "${image}:${safe_ref}-${arch}"
            "${image}:${plain_ref}-${arch}"
            "${image}:latest-${arch}"
          )

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.title=mtproto.zig
            org.opencontainers.image.description=High-performance Telegram MTProto proxy written in Zig
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

  publish-manifest:
    name: Publish Multi-Arch Tags
    runs-on: ubuntu-latest
    needs: build-arch
    steps:
      - name: Set image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          ref_name="${GITHUB_REF_NAME}"
          safe_ref="${ref_name//\//-}"

          if [[ ! "$safe_ref" =~ ^v([0-9]+(\.[0-9]+){0,2}([.-].+)?)$ ]]; then
            echo "Tag must match v<semver>, got: $safe_ref" >&2
            exit 1
          fi
          plain_ref="${BASH_REMATCH[1]}"

          tags=(
            "${safe_ref}"
            "${plain_ref}"
            "latest"
          )

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        shell: bash
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          TAGS: ${{ steps.vars.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            docker buildx imagetools create \
              --tag "${IMAGE}:${tag}" \
              "${IMAGE}:${tag}-amd64" \
              "${IMAGE}:${tag}-arm64"
          done <<< "$TAGS"
